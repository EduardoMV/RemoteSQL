<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote SQL Workbench</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── TOP NAVIGATION ──────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-brand">
      <span class="brand-icon">⬡</span>
      <span class="brand-name">RemoteSQL Workbench</span>
    </div>
    <div class="topbar-meta">
      <span id="connection-status" class="status-dot disconnected" title="API status"></span>
      <span id="connection-label">Connecting…</span>
    </div>
  </header>

  <!-- ── MAIN LAYOUT ──────────────────────────────────────────────────── -->
  <div class="workspace">

    <!-- LEFT SIDEBAR — Schema Explorer -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span>Schema Explorer</span>
        <button class="btn-icon" id="btn-refresh-schema" title="Refresh schema">↺</button>
      </div>
      <div id="schema-tree" class="schema-tree">
        <p class="sidebar-hint">Loading schema…</p>
      </div>
    </aside>

    <!-- CENTER — Editor + Results -->
    <main class="editor-panel">

      <!-- SQL Editor area -->
      <section class="editor-section">
        <div class="editor-toolbar">
          <span class="section-label">SQL Editor</span>
          <div class="editor-actions">
            <button class="btn-ghost" id="btn-clear" title="Clear editor">Clear</button>
            <button class="btn-ghost" id="btn-format" title="Format query">Format</button>
            <button class="btn-primary" id="btn-execute">
              ▶ Execute
            </button>
          </div>
        </div>

        <textarea
          id="sql-input"
          class="sql-textarea"
          spellcheck="false"
          autocorrect="off"
          autocapitalize="off"
          placeholder="-- Type your SQL query here&#10;SELECT * FROM users LIMIT 10;"
        ></textarea>

        <!-- Keyboard hint -->
        <div class="editor-hint">Ctrl + Enter to execute</div>
      </section>

      <!-- Status bar -->
      <div id="status-bar" class="status-bar hidden">
        <span id="status-icon"></span>
        <span id="status-message"></span>
        <span id="status-meta" class="status-meta"></span>
      </div>

      <!-- Results area -->
      <section class="results-section" id="results-section">
        <div class="results-toolbar">
          <span class="section-label">Results</span>
          <span id="results-count" class="results-count"></span>
          <button class="btn-ghost btn-sm" id="btn-export" style="display:none">↓ Export CSV</button>
        </div>
        <div id="results-container" class="results-container">
          <div class="results-empty">
            <span class="empty-icon">◫</span>
            <p>Execute a query to see results here.</p>
          </div>
        </div>
      </section>

    </main>

    <!-- RIGHT PANEL — Query History -->
    <aside class="history-panel">
      <div class="sidebar-header">
        <span>History</span>
        <button class="btn-icon" id="btn-clear-history" title="Clear history">✕</button>
      </div>
      <div id="history-list" class="history-list">
        <p class="sidebar-hint">No queries yet.</p>
      </div>
    </aside>

  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
    <span>Executing…</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
